name: gatuno
services:
  api:
    image: gatuno-api
    container_name: gatuno-api
    shm_size: 2g
    environment:
      - NODE_ENV=${NODE_ENV}
      - API_URL=${API_SCHEME:-https}://${API_HOST}
      - APP_URL=${APP_SCHEME:-https}://${APP_HOST}
      - ALLOWED_URL=${ALLOWED_URL}
      - DB_TYPE=mysql
      - DB_PORT=6033
      - DB_HOST=${DB_HOST:-proxysql}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RUSTFS_ENDPOINT=${RUSTFS_ENDPOINT:-http://rustfs:9000}
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-rustfsadmin}
      - RUSTFS_BUCKET=${RUSTFS_BUCKET:-gatuno-files}
      - RUSTFS_REGION=${RUSTFS_REGION:-us-east-1}
      - KAFKA_HOST=${KAFKA_HOST:-kafka}
      - KAFKA_PORT=${KAFKA_PORT:-9092}
      - NANOMQ_HOST=${NANOMQ_HOST:-emqx}
      - NANOMQ_PORT=${NANOMQ_PORT:-1883}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const http=require('http');const req=http.get('http://localhost:3000/api/health/readiness',(res)=>{process.exit(res.statusCode===200?0:1)});req.on('error',()=>process.exit(1));req.setTimeout(5000,()=>{req.destroy();process.exit(1);});",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    volumes:
      - api-data:/usr/src/app/data
    depends_on:
      proxysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      emqx:
        condition: service_started
    networks:
      - gatuno-net

  emqx:
    image: emqx/emqx:5.8.0
    container_name: gatuno-emqx
    dns_search: "."
    environment:
      - EMQX_NODE__NAME=emqx@127.0.0.1
    ports:
      - "${NANOMQ_PORT:-1883}:1883"
      - "${NANOMQ_WS_PORT:-8083}:8083"
      - "18083:18083"
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./emqx/cluster.hocon:/opt/emqx/data/configs/cluster.hocon:ro
    networks:
      - gatuno-net

  redis:
    image: 'redis:7.4-alpine'
    container_name: gatuno-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --tcp-keepalive 300
      --timeout 0
      --maxmemory-policy noeviction
      --maxmemory 512mb
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis_data:/data
    networks:
      - gatuno-net

  database-master:
    image: mysql:8.4
    container_name: gatuno-database
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u${DB_USER}',
          '-p${DB_PASS}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      DB_REPL_USER: ${DB_REPL_USER}
      DB_REPL_PASS: ${DB_REPL_PASS}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 512M
    volumes:
      - database-data:/var/lib/mysql
      - ./database/master/init.sh:/docker-entrypoint-initdb.d/init.sh
      - ./database/master/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./database/migrations:/migrations:ro
    networks:
      - gatuno-net

  database-slave-1:
    <<: &mysql-slave-base
      image: mysql:8.4
      environment:
        MYSQL_ROOT_PASSWORD: ${DB_PASS}
        DB_MASTER_HOST: database-master
        DB_REPL_USER: ${DB_REPL_USER}
        DB_REPL_PASS: ${DB_REPL_PASS}
      deploy:
        resources:
          limits:
            cpus: '1.0'
            memory: 1G
          reservations:
            cpus: '0.2'
            memory: 512M
      depends_on:
        database-master:
          condition: service_healthy
      healthcheck:
        test: ['CMD', '/usr/local/bin/healthcheck-replica.sh']
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 60s
      networks:
        - gatuno-net
    container_name: gatuno-database-slave-1
    volumes:
      - database-slave-1-data:/var/lib/mysql
      - ./database/slave/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./database/slave/init.sh:/docker-entrypoint-initdb.d/init.sh
      - ./database/slave/healthcheck-replica.sh:/usr/local/bin/healthcheck-replica.sh:ro
    command: ['mysqld', '--server-id=2']

  database-slave-2:
    <<: *mysql-slave-base
    container_name: gatuno-database-slave-2
    volumes:
      - database-slave-2-data:/var/lib/mysql
      - ./database/slave/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./database/slave/init.sh:/docker-entrypoint-initdb.d/init.sh
      - ./database/slave/healthcheck-replica.sh:/usr/local/bin/healthcheck-replica.sh:ro
    command: ['mysqld', '--server-id=3']

  proxysql:
    image: proxysql/proxysql:2.6.4
    container_name: gatuno-proxysql
    volumes:
      - ./database/proxy/docker-entrypoint.sh:/docker-entrypoint.sh
    entrypoint: ["/bin/bash", "/docker-entrypoint.sh"]
    environment:
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    ports:
      - "6032:6032"
      - "6033:6033"
    depends_on:
      database-master:
        condition: service_healthy
      database-slave-1:
        condition: service_healthy
      database-slave-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysql", "-uadmin", "-padmin", "-h127.0.0.1", "-P6032", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gatuno-net

  rustfs:
    image: rustfs/rustfs:latest
    container_name: gatuno-rustfs
    security_opt:
      - "no-new-privileges:true"
    environment:
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CORS_ALLOWED_ORIGINS=${APP_SCHEME:-https}://${APP_HOST},${API_SCHEME:-https}://${API_HOST},${ALLOWED_URL}
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-rustfsadmin}
    volumes:
      - rustfs_data:/data
    networks:
      - gatuno-net

  rustfs-init:
    image: minio/mc
    depends_on:
      - rustfs
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-rustfsadmin}
      - RUSTFS_BUCKET=${RUSTFS_BUCKET:-gatuno-files}
      - RUSTFS_BUCKETS_LIST=books users processing system
      - APP_SCHEME=${APP_SCHEME:-https}
      - APP_HOST=${APP_HOST}
      - API_SCHEME=${API_SCHEME:-https}
      - API_HOST=${API_HOST}
      - RUSTFS_EXTRA_REFERERS=${ALLOWED_URL}
      - RUSTFS_PUBLIC_BUCKETS=${RUSTFS_PUBLIC_BUCKETS:-books users processing system}
    volumes:
      - ./scripts/init-rustfs.sh:/usr/local/bin/init-rustfs.sh:ro
    entrypoint: /usr/local/bin/init-rustfs.sh
    networks:
      - gatuno-net

  kafka:
    image: apache/kafka:4.0.2
    container_name: gatuno-kafka
    ports:
      - "${KAFKA_PORT_EXTERNAL:-9092}:9094"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:${KAFKA_PORT_EXTERNAL:-9092}
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_NUM_PARTITIONS=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - gatuno-net

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: gatuno-meilisearch
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_NO_ANALYTICS=true
      - MEILI_ENV=${NODE_ENV:-development}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - meilisearch-data:/meili_data
    networks:
      - gatuno-net

  meilisync:
    image: long2ice/meilisync:latest
    container_name: gatuno-meilisync
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_HOST=http://meilisearch:7700
       - DB_HOST=proxysql
      - DB_PORT=${DB_PORT:-6033}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DSN=redis://:${REDIS_PASSWORD}@redis:6379/0
    command: >
      sh -c "python3 /meilisync/patch.py && python3 -c \"import os, sys; print(os.path.expandvars(sys.stdin.read()))\" < /meilisync/config.yml > /tmp/config.yml && meilisync -c /tmp/config.yml start"
    depends_on:
      proxysql:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - gatuno-net


volumes:
  database-data:
  database-slave-1-data:
  database-slave-2-data:
  api-data:
  redis_data:
  rustfs_data:
  kafka-data:
  meilisearch-data:

networks:
  gatuno-net:
    driver: bridge
