name: gatuno-tools
services:
  phpmyadmin:
    image: phpmyadmin:5.2
    ports:
      - "${PHPMYADMIN_PORT}:80"
    environment:
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASS}
      PMA_HOSTS: database-master,database-slave-1,database-slave-2
    networks:
      - gatuno-net

  redis-commander:
    image: ghcr.io/joeferner/redis-commander:0.8.1
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD}
    ports:
      - "${REDISCOMMANDER_PORT}:8081"
    networks:
      - gatuno-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: gatuno-kafka-ui
    ports:
      - "8085:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=gatuno-local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - DYNAMIC_CONFIG_ENABLED=true
    networks:
      - gatuno-net

networks:
  gatuno-net:
    external: true
    name: gatuno_gatuno-net
