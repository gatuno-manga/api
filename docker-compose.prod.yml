# Override de producao (usar junto com docker-compose.common.yml)
services:
  api:
    build:
      context: ./back
      dockerfile: Dockerfile.prod
    env_file:
      - ./back/.env
    ports:
      - "${API_PORT}:3000"
    restart: always

  app:
    build:
      context: ./front
      dockerfile: Dockerfile.prod
      args:
        - API_URL=https://${API_HOST}
        - API_URL_SERVER=http://api:3000
    ports:
      - "${APP_PORT}:4000"
    restart: always

  database-master:
    restart: always

  database-slave-1:
    restart: always

  database-slave-2:
    restart: always

  redis:
    restart: always
