# Override de producao (usar junto com docker-compose.common.yml)
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file:
      - ./.env
    ports:
      - "${API_PORT}:3000"
    restart: always

  database-master:
    restart: always

  database-slave-1:
    restart: always

  database-slave-2:
    restart: always

  redis:
    restart: always

  browserless:
    restart: always

  meilisearch:
    restart: always

  meilisync:
    restart: always
    volumes:
      - ./search/meilisync.yml:/meilisync/config.yml
