# Override de desenvolvimento (usar junto com docker-compose.common.yml)
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${API_PORT}:3000"
      - "9229:9229"
    command: npm run start:debug
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NODE_OPTIONS=--max-old-space-size=3072
      - ALLOWED_URL=${ALLOWED_URL:-http://localhost:4200}
      - APP_URL=${APP_SCHEME:-http}://${APP_HOST:-localhost:4200}
      - API_URL=${API_SCHEME:-http}://localhost:${API_PORT}
      - PLAYWRIGHT_WS_ENDPOINT=${PLAYWRIGHT_WS_ENDPOINT:-ws://playwright-debug:3000}
      - PLAYWRIGHT_DEBUG=${PLAYWRIGHT_DEBUG:-true}
      - PLAYWRIGHT_SLOW_MO=${PLAYWRIGHT_SLOW_MO}
      - KAFKA_HOST=${KAFKA_HOST:-kafka}
      - KAFKA_PORT=${KAFKA_PORT:-9092}
      # Session / JWT Settings (defaults in Joi schema: ACCESS=15m, REFRESH=7d, MAX_SESSIONS=0=unlimited)
      # - JWT_ACCESS_EXPIRATION=15m
      # - JWT_REFRESH_EXPIRATION=7d
      # - MAX_SESSIONS_PER_USER=0
    depends_on:
      - playwright-debug
      - kafka
    develop:
      watch:
        - action: sync
          path: ./src
          target: /usr/src/app/src
          ignore:
            - node_modules/
        - action: rebuild
          path: ./package.json

    volumes:
      - ./.env:/usr/src/app/.env

  playwright-debug:
    image: browserless/chrome:latest
    ports:
      - "${PLAYWRIGHT_NOVNC_PORT}:3000"
      - "9222:9222"
    environment:
      - CONNECTION_TIMEOUT=600000
      - MAX_CONCURRENT_SESSIONS=10
      - ENABLE_DEBUGGER=true
      - PREBOOT_CHROME=true
      - KEEP_ALIVE=true
    networks:
      - gatuno-net

  database-master:
    ports:
      - "${DB_MASTER_EXTERNAL_PORT}:3306"

  database-slave-1:
    ports:
      - "${DB_SLAVE_1_EXTERNAL_PORT}:3306"

  database-slave-2:
    ports:
      - "${DB_SLAVE_2_EXTERNAL_PORT}:3306"

  rustfs:
    ports:
      - "9000:9000"
      - "9001:9001"
