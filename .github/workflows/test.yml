name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: LFS Cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: |
            ${{ runner.os }}-lfs-

      - name: Git LFS Pull
        run: git lfs pull

      - name: Set up Backend
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.1'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install Backend Dependencies
        run: npm ci

      - name: Run Backend Tests
        run: npm run test

      - name: Build Backend
        run: npm run build

  build-and-publish:
    name: call-registry
    needs: test-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: gatuno-manga/workflows/.github/workflows/registry.yml@main
    with:
      image_name: gatuno-api
      build_context: .
      dockerfile_path: Dockerfile.prod
      dockerfile_candidates: Dockerfile,Dockerfile.prod,docker/Dockerfile,build/Dockerfile
      runner_labels_json: '["self-hosted","linux","x64"]'
      build_platform: linux/amd64
    secrets: inherit
