name: CI

on:
  push:
    branches:
      - main
      - developer
  pull_request:
    branches:
      - main
      - developer
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre_job:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          concurrent_skipping: 'never'
          skip_after_successful_duplicate: 'true'
          do_not_skip: '["pull_request", "workflow_dispatch", "schedule"]'

  ci:
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'
    uses: gatuno-manga/workflows/.github/workflows/node-ci.yml@main
    with:
      node_version: '24.11.1'
      lint_command: "npm run lint:biome"
      test_command: "npm run test"

  build-and-publish:
    needs: [pre_job, ci]
    if: |
      always() &&
      !cancelled() &&
      (needs.ci.result == 'success' || needs.ci.result == 'skipped') &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/developer')
    uses: gatuno-manga/workflows/.github/workflows/registry.yml@main
    with:
      image_name: gatuno-api
      image_tag: ${{ github.ref == 'refs/heads/main' && 'latest' || 'staging' }}
      build_context: .
      dockerfile_path: Dockerfile.prod
      runner_labels_json: '["self-hosted","linux","x64"]'
    secrets: inherit

  release:
    needs: build-and-publish
    if: |
      github.event_name == 'push' && 
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/developer')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.1'
          cache: 'npm'
      - run: npm ci
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
