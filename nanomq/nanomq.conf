# Arquivo de configuração NanoMQ
# Protegendo o Broker com WebHook ACL

# 1. Configurações base do broker MQTT
mqtt {
    property_size = 32
    max_packet_size = 10MB
    max_mqueue_len = 2048
    retry_interval = 10s
    keepalive_multiplier = 1.25
}

listeners.tcp {
    bind = "0.0.0.0:1883"
}

listeners.ws {
    bind = "0.0.0.0:8083"
    path = "/mqtt"
}

# Habilitar logs detalhados para debug de conexão
log {
    to = [console]
    level = debug
}

# 2. Configuração de Segurança (HTTP WebHook)
# 2. Configuração de Segurança (HTTP WebHook)
auth {
    allow_anonymous = false
    http {
        enable = true
        
        # Conexão (Login)
        auth_req {
            url = "http://api:3000/api/auth/mqtt/connect"
            method = "POST"
            headers {
                "content-type" = "application/json"
            }
            params {
                clientid = "%c"
                username = "%u"
                password = "%p"
            }
        }
        
        # Superuser Req (pode ficar vazio/false se não usado, ou apontar para o mesmo)
        super_req {
            url = "http://api:3000/api/auth/mqtt/connect"
            method = "POST"
            headers {
                "content-type" = "application/json"
            }
            params {
                clientid = "%c"
                username = "%u"
                password = "%p"
            }
        }

        # ACL (Permissões de Leitura/Escrita por Tópico)
        acl_req {
            url = "http://api:3000/api/auth/mqtt/acl"
            method = "POST"
            headers {
                "content-type" = "application/json"
            }
            params {
                clientid = "%c"
                username = "%u"
                password = "%p"
                access = "%A"
                topic = "%t"
            }
        }
    }
}
