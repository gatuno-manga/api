services:
  # Prometheus - Coleta de métricas
  prometheus:
    image: prom/prometheus:latest
    container_name: gatuno-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - '9090:9090'
    networks:
      - gatuno-network
    restart: unless-stopped

  # Grafana - Visualização de métricas
  grafana:
    image: grafana/grafana:latest
    container_name: gatuno-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3002
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards
    ports:
      - '3002:3000'
    depends_on:
      - prometheus
      - loki
    networks:
      - gatuno-network
    restart: unless-stopped

  # Loki - Armazenamento e indexação de logs
  loki:
    image: grafana/loki:2.9.8
    container_name: gatuno-loki
    command:
      - '-config.file=/etc/loki/config.yml'
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    ports:
      - '3100:3100'
    networks:
      - gatuno-network
    restart: unless-stopped

  # Promtail - Coleta de logs Docker e envio para Loki
  promtail:
    image: grafana/promtail:2.9.8
    container_name: gatuno-promtail
    command:
      - '-config.file=/etc/promtail/config.yml'
      - '-config.expand-env=true'
    environment:
      - NODE_ENV=${NODE_ENV:-development}
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/tmp
    depends_on:
      - loki
    networks:
      - gatuno-network
    restart: unless-stopped

  # AlertManager (opcional) - Gerenciamento de alertas
  alertmanager:
    image: prom/alertmanager:latest
    container_name: gatuno-alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - '9093:9093'
    networks:
      - gatuno-network
    restart: unless-stopped

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local
  loki-data:
    driver: local
  promtail-positions:
    driver: local

networks:
  gatuno-network:
    name: gatuno_gatuno-net
    external: true
